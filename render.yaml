# Render blueprint — github.com/fluent93/meeting-actions (create repo & deploy)
services:
  - type: web
    name: meeting-actions
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: STT_ENGINE
        value: "gemini"
      - key: PYTHON_VERSION
        value: "3.11.11"
